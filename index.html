<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="FlavorFind — Entdecke Rezepte cineastisch, koche mit geführtem Modus, plane deine Woche."
    />
    <meta name="author" content="Youssef Dawod" />
    <link rel="canonical" href="https://flavorfind.yellowdeveloper.de/" />
    <meta
      name="theme-color"
      content="#000000"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#FAF5EC"
      media="(prefers-color-scheme: light)"
    />
    <meta name="color-scheme" content="dark light" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FlavorFind" />
    <meta property="og:title" content="FlavorFind — Cook like it matters." />
    <meta
      property="og:description"
      content="Entdecke Rezepte cineastisch, koche mit geführtem Modus, plane deine Woche."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://flavorfind.yellowdeveloper.de" />
    <meta property="og:locale" content="de_DE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlavorFind — Cook like it matters." />
    <meta
      name="twitter:description"
      content="Entdecke Rezepte cineastisch, koche mit geführtem Modus, plane deine Woche."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- OpenSearch (Chrome Tab-to-Search) -->
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      title="FlavorFind"
      href="/opensearch.xml"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <title>FlavorFind — Cook like it matters.</title>

    <!-- Anti-FOUC: Theme sofort setzen, bevor React mountet -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("flavorfind:theme");
          var prefersLight = window.matchMedia(
            "(prefers-color-scheme: light)",
          ).matches;
          var theme =
            stored === "dark" || stored === "light"
              ? stored
              : prefersLight
                ? "light"
                : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <noscript>
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 2rem;
          background: #000;
          color: #faf5ec;
          font-family: system-ui, sans-serif;
          text-align: center;
          z-index: 9999;
        "
      >
        <div style="max-width: 32rem">
          <h1 style="font-size: 1.5rem; margin-bottom: 1rem; color: #d4a574">
            FlavorFind benötigt JavaScript
          </h1>
          <p style="line-height: 1.6; opacity: 0.8">
            Diese App ist eine interaktive Single-Page-Anwendung. Bitte
            aktiviere JavaScript in deinem Browser, um Rezepte zu entdecken, zu
            suchen und zu kochen.
          </p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
